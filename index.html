<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PoleTracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1117; color: #c9d1d9;
      padding: 24px;
    }
    h1 { color: #58a6ff; margin-bottom: 20px; font-size: 1.5rem; }
    h2 { color: #8b949e; font-size: 0.8rem; margin-bottom: 12px;
         text-transform: uppercase; letter-spacing: 1px; }
    .btn {
      padding: 10px 22px; border: none; border-radius: 6px;
      font-size: 0.95rem; cursor: pointer; margin-right: 10px;
      background: #238636; color: white;
    }
    .btn:hover { background: #2ea043; }
    #estado { font-size: 0.9rem; color: #8b949e; margin-left: 10px; }

    .resumen-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px; margin: 24px 0;
    }
    .card {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 10px; padding: 16px; text-align: center;
    }
    .card .valor { font-size: 1.6rem; color: #58a6ff; font-weight: bold; }
    .card .label { font-size: 0.72rem; color: #8b949e; margin-top: 4px; }

    .section { margin-bottom: 28px; }

    .chart-container {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 10px; padding: 16px;
      margin-bottom: 28px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th {
      background: #161b22; color: #8b949e;
      padding: 10px 12px; text-align: left;
      border-bottom: 1px solid #30363d;
    }
    td { padding: 8px 12px; border-bottom: 1px solid #21262d; }
    tr:hover td { background: #161b22; }

    #log {
      background: #0d1117; border: 1px solid #30363d;
      border-radius: 6px; padding: 10px;
      height: 140px; overflow-y: auto;
      font-size: 0.75rem; color: #3fb950; font-family: monospace;
    }
  </style>
</head>
<body>
  <h1>🏔️ PoleTracker</h1>

  <div class="section">
    <button class="btn" id="btnConectar">Conectar BLE</button>
    <span id="estado">Desconectado</span>
  </div>

  <div class="section">
    <h2>Resumen de sesión</h2>
    <div class="resumen-grid">
      <div class="card"><div class="valor" id="rTotal">—</div><div class="label">Ciclos</div></div>
      <div class="card"><div class="valor" id="rCadencia">—</div><div class="label">Cadencia (cpm)</div></div>
      <div class="card"><div class="valor" id="rAngProm">—</div><div class="label">Ángulo promedio (°)</div></div>
      <div class="card"><div class="valor" id="rApoyoProm">—</div><div class="label">Apoyo promedio (ms)</div></div>
    </div>
  </div>

  <div class="chart-container">
    <h2 style="margin-bottom:16px">Evolución durante la sesión</h2>
    <canvas id="grafica" height="100"></canvas>
  </div>

  <div class="section">
    <h2>Ciclos</h2>
    <table>
      <thead>
        <tr>
          <th>#</th><th>Tiempo (s)</th><th>Ángulo (°)</th>
          <th>Magnitud (g)</th><th>Apoyo (ms)</th>
        </tr>
      </thead>
      <tbody id="tablaBody"></tbody>
    </table>
  </div>

  <div class="section">
    <h2>Log</h2>
    <div id="log"></div>
  </div>

<script>
  const NUS_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
  const TX_CHAR     = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

  let ciclos      = [];
  let rxBuffer    = '';
  let txChar      = null;
  let keepaliveInterval = null;
  let primerTimestamp   = null;

  const logEl    = document.getElementById('log');
  const estadoEl = document.getElementById('estado');
  const tablaEl  = document.getElementById('tablaBody');

  // ===== GRÁFICA =====
  const ctx = document.getElementById('grafica').getContext('2d');
  const grafica = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [
        {
          label: 'Ángulo plantación (°)',
          data: [],
          borderColor: '#58a6ff',
          backgroundColor: 'rgba(88,166,255,0.1)',
          tension: 0.3,
          yAxisID: 'yAngulo'
        },
        {
          label: 'Duración apoyo (ms)',
          data: [],
          borderColor: '#3fb950',
          backgroundColor: 'rgba(63,185,80,0.1)',
          tension: 0.3,
          yAxisID: 'yApoyo'
        }
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#c9d1d9' } }
      },
      scales: {
        x: {
          ticks: { color: '#8b949e' },
          grid:  { color: '#21262d' },
          title: { display: true, text: 'Tiempo (s)', color: '#8b949e' }
        },
        yAngulo: {
          type: 'linear', position: 'left',
          ticks: { color: '#58a6ff' },
          grid:  { color: '#21262d' },
          title: { display: true, text: 'Ángulo (°)', color: '#58a6ff' }
        },
        yApoyo: {
          type: 'linear', position: 'right',
          ticks: { color: '#3fb950' },
          grid:  { drawOnChartArea: false },
          title: { display: true, text: 'Apoyo (ms)', color: '#3fb950' }
        }
      }
    }
  });

  // ===== HELPERS =====
  function log(msg) {
    logEl.innerHTML += msg + '<br>';
    logEl.scrollTop = logEl.scrollHeight;
    console.log(msg);
  }

  function setEstado(txt, color = '#8b949e') {
    estadoEl.textContent = txt;
    estadoEl.style.color = color;
  }

  function marcarDesconectado() {
    setEstado('Desconectado', '#f85149');
    log('Dispositivo desconectado');
    if (keepaliveInterval) { clearInterval(keepaliveInterval); keepaliveInterval = null; }
  }

  // ===== KEEPALIVE: detecta desconexión leyendo la característica cada 3s =====
  function iniciarKeepalive() {
    keepaliveInterval = setInterval(async () => {
      if (!txChar) return;
      try {
        await txChar.readValue();
      } catch (e) {
        marcarDesconectado();
      }
    }, 3000);
  }

  // ===== CONEXIÓN =====
  document.getElementById('btnConectar').onclick = async () => {
    if (!navigator.bluetooth) {
      alert('Web Bluetooth no disponible. Usa Chrome en escritorio o Android.');
      return;
    }
    try {
      log('Buscando Pole...');
      const device = await navigator.bluetooth.requestDevice({
        filters: [{ name: 'Pole' }],
        optionalServices: [NUS_SERVICE]
      });

      device.addEventListener('gattserverdisconnected', marcarDesconectado);

      log('Conectando...');
      const server  = await device.gatt.connect();

      log('Obteniendo servicio...');
      const service = await server.getPrimaryService(NUS_SERVICE);

      log('Suscribiendo notificaciones...');
      txChar = await service.getCharacteristic(TX_CHAR);
      await txChar.startNotifications();
      txChar.addEventListener('characteristicvaluechanged', onDatos);

      setEstado('✅ Conectado — esperando datos...', '#3fb950');
      log('Listo. El XIAO enviará la sesión automáticamente.');
      iniciarKeepalive();

    } catch (err) {
      log('ERROR: ' + err);
      setEstado('Error', '#f85149');
    }
  };

  // ===== RECEPCIÓN =====
  function onDatos(event) {
    const chunk = new TextDecoder().decode(event.target.value);
    rxBuffer += chunk;
    const lineas = rxBuffer.split('\n');
    rxBuffer = lineas.pop();
    lineas.forEach(procesarLinea);
  }

  function procesarLinea(linea) {
    linea = linea.trim();
    if (!linea) return;
    log('← ' + linea);

    if (linea.startsWith('INICIO_SESION')) {
      ciclos          = [];
      primerTimestamp = null;
      tablaEl.innerHTML = '';
      grafica.data.labels   = [];
      grafica.data.datasets[0].data = [];
      grafica.data.datasets[1].data = [];
      grafica.update();
      const n = parseInt(linea.split(',')[1]);
      log('Sesión iniciada: ' + n + ' ciclos esperados');

    } else if (linea.startsWith('C,')) {
      const p = linea.split(',');
      const c = {
        timestamp: parseInt(p[1]),
        angulo:    parseFloat(p[2]),
        magnitud:  parseFloat(p[3]),
        duracion:  parseInt(p[4])
      };

      // Tiempo relativo al primer impacto
      if (primerTimestamp === null) primerTimestamp = c.timestamp;
      const tiempoRelativo = ((c.timestamp - primerTimestamp) / 1000).toFixed(1);

      ciclos.push(c);

      // Tabla
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${ciclos.length}</td>
        <td>${tiempoRelativo}</td>
        <td>${c.angulo.toFixed(1)}°</td>
        <td>${c.magnitud.toFixed(2)} g</td>
        <td>${c.duracion > 0 ? c.duracion : '—'}</td>`;
      tablaEl.appendChild(tr);
      tablaEl.lastChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      // Gráfica — solo añadimos si tiene duración (ciclo completo)
      grafica.data.labels.push(tiempoRelativo + 's');
      grafica.data.datasets[0].data.push(c.angulo);
      grafica.data.datasets[1].data.push(c.duracion > 0 ? c.duracion : null);
      grafica.update('none'); // sin animación para que sea fluido

    } else if (linea === 'FIN_SESION') {
      log('✅ Sesión completa');
      setEstado('✅ Sesión recibida', '#3fb950');
      grafica.update();
      calcularResumen();
    }
  }

  // ===== RESUMEN =====
  function calcularResumen() {
    const validos = ciclos.filter(c => c.duracion > 0);
    if (!validos.length) return;

    const angulos = validos.map(c => c.angulo);
    const apoyos  = validos.map(c => c.duracion);
    const prom    = arr => arr.reduce((a, b) => a + b, 0) / arr.length;

    let cadencia = 0;
    if (ciclos.length > 1) {
      const dur = ciclos[ciclos.length - 1].timestamp - ciclos[0].timestamp;
      if (dur > 0) cadencia = ((ciclos.length - 1) * 60000) / dur;
    }

    document.getElementById('rTotal').textContent     = validos.length;
    document.getElementById('rCadencia').textContent  = cadencia.toFixed(1);
    document.getElementById('rAngProm').textContent   = prom(angulos).toFixed(1) + '°';
    document.getElementById('rApoyoProm').textContent = Math.round(prom(apoyos)) + ' ms';
  }
</script>
</body>
</html>
