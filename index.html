<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>XIAO IMU Monitor</title>
  <style>
    body { font-family: monospace; background: #0d1117; color: #c9d1d9; 
           display: flex; flex-direction: column; align-items: center; padding: 40px; }
    h1 { color: #58a6ff; }
    button { padding: 12px 24px; margin: 8px; border: none; border-radius: 6px;
             font-size: 1rem; cursor: pointer; }
    #btnConectar    { background: #238636; color: white; }
    #btnDesconectar { background: #da3633; color: white; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px;
            padding: 30px; margin: 20px; min-width: 320px; text-align: center; }
    .valor { font-size: 2.5rem; color: #58a6ff; margin: 6px 0; }
    .label { color: #8b949e; font-size: 0.85rem; }
    #estado { margin: 10px; color: #8b949e; }
    #log { background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
           padding: 10px; height: 150px; overflow-y: auto; 
           font-size: 0.75rem; color: #3fb950; width: 400px; text-align: left; }
  </style>
</head>
<body>
  <h1>XIAO IMU Monitor</h1>
  <div>
    <button id="btnConectar">Conectar BLE</button>
    <button id="btnDesconectar">Desconectar</button>
  </div>
  <p id="estado">Desconectado</p>

  <div class="card">
    <div class="label">Aceleración X</div>
    <div class="valor" id="ax">—</div>
    <div class="label">Aceleración Y</div>
    <div class="valor" id="ay">—</div>
    <div class="label">Aceleración Z</div>
    <div class="valor" id="az">—</div>
    <div class="label" id="ts"></div>
  </div>

  <div id="log"></div>

<script>
  const SERVICE_UUID = '19b10000-e8f2-537e-4f6c-d104768a1214';
  const CHAR_UUID    = '19b10001-e8f2-537e-4f6c-d104768a1214';

  let device, server, characteristic;
  const log = (msg) => {
    const div = document.getElementById('log');
    div.innerHTML += msg + '<br>';
    div.scrollTop = div.scrollHeight;
    console.log(msg);
  };

  document.getElementById('btnConectar').onclick = async () => {
    try {
      log('Buscando dispositivo...');
      device = await navigator.bluetooth.requestDevice({
        filters: [{ name: 'XIAO-IMU' }],
        optionalServices: [SERVICE_UUID]
      });

      device.addEventListener('gattserverdisconnected', () => {
        document.getElementById('estado').textContent = 'Desconectado';
        log('Dispositivo desconectado');
      });

      log('Conectando a GATT...');
      server = await device.gatt.connect();

      log('Obteniendo servicio...');
      const service = await server.getPrimaryService(SERVICE_UUID);

      log('Obteniendo característica...');
      characteristic = await service.getCharacteristic(CHAR_UUID);

      log('Activando notificaciones...');
      await characteristic.startNotifications();
      characteristic.addEventListener('characteristicvaluechanged', onDatos);

      document.getElementById('estado').textContent = '✅ Conectado a ' + device.name;
      log('¡Listo! Esperando datos...');

    } catch (err) {
      log('ERROR: ' + err);
    }
  };

  document.getElementById('btnDesconectar').onclick = async () => {
    if (characteristic) await characteristic.stopNotifications();
    if (server && server.connected) server.disconnect();
    document.getElementById('estado').textContent = 'Desconectado';
    log('Desconectado manualmente');
  };

  function onDatos(event) {
    const raw = new TextDecoder().decode(event.target.value);
    log('RAW: ' + raw);
    const partes = raw.split(',');
    if (partes.length === 3) {
      document.getElementById('ax').textContent = parseFloat(partes[0]).toFixed(3) + ' g';
      document.getElementById('ay').textContent = parseFloat(partes[1]).toFixed(3) + ' g';
      document.getElementById('az').textContent = parseFloat(partes[2]).toFixed(3) + ' g';
      document.getElementById('ts').textContent = new Date().toLocaleTimeString();
    }
  }
</script>
</body>
</html>
