<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoleTracker</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #1a1a2e; color: #eee; }
    h1 { color: #00d4ff; }
    button { background: #00d4ff; color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; margin: 8px; cursor: pointer; }
    button:disabled { background: #444; color: #888; }
    #estado { margin: 16px 0; padding: 12px; background: #16213e; border-radius: 8px; }
    #datos { margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #00d4ff; color: #000; padding: 8px; }
    td { padding: 8px; border-bottom: 1px solid #333; text-align: center; }
    tr:nth-child(even) { background: #16213e; }
    #resumen { background: #16213e; padding: 16px; border-radius: 8px; margin: 16px 0; display: none; }
    .stat { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #333; }
    .val { color: #00d4ff; font-weight: bold; }
  </style>
</head>
<body>
  <h1>🏔️ PoleTracker</h1>

  <button id="btnConectar">Conectar XIAO</button>
  <button id="btnLimpiar" disabled>Limpiar datos</button>

  <div id="estado">Estado: desconectado</div>

  <div id="resumen">
    <h3>Resumen sesión</h3>
    <div class="stat"><span>Total ciclos</span><span class="val" id="rCiclos">-</span></div>
    <div class="stat"><span>Ángulo promedio</span><span class="val" id="rAngulo">-</span></div>
    <div class="stat"><span>Ángulo mín / máx</span><span class="val" id="rAnguloMM">-</span></div>
    <div class="stat"><span>Apoyo promedio</span><span class="val" id="rApoyo">-</span></div>
    <div class="stat"><span>Apoyo mín / máx</span><span class="val" id="rApoyoMM">-</span></div>
    <div class="stat"><span>Impacto promedio</span><span class="val" id="rImpacto">-</span></div>
  </div>

  <div id="datos">
    <table id="tabla">
      <thead>
        <tr>
          <th>#</th>
          <th>Tiempo (s)</th>
          <th>Ángulo (°)</th>
          <th>Impacto (g)</th>
          <th>Apoyo (ms)</th>
        </tr>
      </thead>
      <tbody id="cuerpoTabla"></tbody>
    </table>
  </div>

  <script>
    const SERVICE_UUID    = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const TX_CHAR_UUID    = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

    let device, txChar;
    let buffer = '';
    let ciclos = [];
    let totalEsperados = 0;

    const btnConectar = document.getElementById('btnConectar');
    const btnLimpiar  = document.getElementById('btnLimpiar');
    const estado      = document.getElementById('estado');
    const cuerpo      = document.getElementById('cuerpoTabla');
    const resumen     = document.getElementById('resumen');

    function setEstado(msg) { estado.textContent = 'Estado: ' + msg; }

    btnConectar.addEventListener('click', async () => {
      try {
        setEstado('buscando dispositivo...');
        device = await navigator.bluetooth.requestDevice({
          filters: [{ name: 'PoleTracker' }],
          optionalServices: [SERVICE_UUID]
        });

        setEstado('conectando...');
        const server  = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        txChar        = await service.getCharacteristic(TX_CHAR_UUID);

        await txChar.startNotifications();
        txChar.addEventListener('characteristicvaluechanged', onDatos);

        device.addEventListener('gattserverdisconnected', () => {
          setEstado('desconectado');
          btnConectar.disabled = false;
        });

        setEstado('conectado — esperando datos...');
        btnConectar.disabled = true;
        btnLimpiar.disabled  = false;

      } catch(e) {
        setEstado('error: ' + e.message);
      }
    });

    btnLimpiar.addEventListener('click', () => {
      ciclos = [];
      totalEsperados = 0;
      cuerpo.innerHTML = '';
      resumen.style.display = 'none';
      setEstado('datos limpiados');
    });

    function onDatos(event) {
      const valor = new TextDecoder().decode(event.target.value);
      buffer += valor;
      let lineas = buffer.split('\n');
      buffer = lineas.pop(); // ultima linea incompleta queda en buffer

      for (const linea of lineas) {
        procesarLinea(linea.trim());
      }
    }

    function procesarLinea(linea) {
      if (!linea) return;

      if (linea.startsWith('INICIO_SESION')) {
        const partes = linea.split(',');
        totalEsperados = parseInt(partes[1]);
        ciclos = [];
        cuerpo.innerHTML = '';
        resumen.style.display = 'none';
        setEstado('recibiendo ' + totalEsperados + ' ciclos...');
        return;
      }

      if (linea.startsWith('C,')) {
        const p = linea.split(',');
        const ciclo = {
          timestamp:       parseInt(p[1]),
          angulo:          parseFloat(p[2]),
          magnitudImpacto: parseFloat(p[3]),
          duracion:        parseInt(p[4])
        };
        ciclos.push(ciclo);
        añadirFila(ciclo, ciclos.length);
        setEstado('recibidos ' + ciclos.length + ' / ' + totalEsperados);
        return;
      }

      if (linea === 'FIN_SESION') {
        setEstado('sesión completa — ' + ciclos.length + ' ciclos');
        calcularResumen();
        return;
      }
    }

    function añadirFila(ciclo, n) {
      const tr = document.createElement('tr');
      const t  = (ciclo.timestamp / 1000).toFixed(1);
      tr.innerHTML = `
        <td>${n}</td>
        <td>${t}</td>
        <td>${ciclo.angulo.toFixed(1)}</td>
        <td>${ciclo.magnitudImpacto.toFixed(2)}</td>
        <td>${ciclo.duracion}</td>
      `;
      cuerpo.appendChild(tr);
    }

    function calcularResumen() {
      if (ciclos.length === 0) return;

      let sA = 0, sI = 0, sD = 0;
      let minA = 999, maxA = 0;
      let minD = 99999, maxD = 0;

      for (const c of ciclos) {
        sA += c.angulo;
        sI += c.magnitudImpacto;
        sD += c.duracion;
        if (c.angulo < minA) minA = c.angulo;
        if (c.angulo > maxA) maxA = c.angulo;
        if (c.duracion < minD) minD = c.duracion;
        if (c.duracion > maxD) maxD = c.duracion;
      }

      const n = ciclos.length;
      document.getElementById('rCiclos').textContent   = n;
      document.getElementById('rAngulo').textContent   = (sA/n).toFixed(1) + '°';
      document.getElementById('rAnguloMM').textContent = minA.toFixed(1) + '° / ' + maxA.toFixed(1) + '°';
      document.getElementById('rApoyo').textContent    = (sD/n).toFixed(0) + ' ms';
      document.getElementById('rApoyoMM').textContent  = minD + ' ms / ' + maxD + ' ms';
      document.getElementById('rImpacto').textContent  = (sI/n).toFixed(2) + ' g';

      resumen.style.display = 'block';
    }
  </script>
</body>
</html>
