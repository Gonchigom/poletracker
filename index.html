<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoleTracker</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #1a1a2e; color: #eee; }
    h1 { color: #00d4ff; }
    button { background: #00d4ff; color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; margin: 8px; cursor: pointer; }
    button:disabled { background: #444; color: #888; }
    #estado { margin: 16px 0; padding: 12px; background: #16213e; border-radius: 8px; }
    #datos { margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #00d4ff; color: #000; padding: 8px; }
    td { padding: 8px; border-bottom: 1px solid #333; text-align: center; }
    tr:nth-child(even) { background: #16213e; }
    #resumen { background: #16213e; padding: 16px; border-radius: 8px; margin: 16px 0; display: none; }
    .stat { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #333; }
    .val { color: #00d4ff; font-weight: bold; }
  </style>
</head>
<body>
  <h1>🏔️ PoleTracker</h1>

  <button id="btnConectar">Conectar XIAO</button>
  <button id="btnLimpiar" disabled>Limpiar datos</button>

  <div id="estado">Estado: desconectado</div>

  <div id="resumen">
    <h3>Resumen sesión</h3>
    <div class="stat"><span>Total ciclos</span><span class="val" id="rCiclos">-</span></div>
    <div class="stat"><span>Ángulo promedio</span><span class="val" id="rAngulo">-</span></div>
    <div class="stat"><span>Ángulo mín / máx</span><span class="val" id="rAnguloMM">-</span></div>
    <div class="stat"><span>Apoyo promedio</span><span class="val" id="rApoyo">-</span></div>
    <div class="stat"><span>Apoyo mín / máx</span><span class="val" id="rApoyoMM">-</span></div>
    <div class="stat"><span>Impacto promedio</span><span class="val" id="rImpacto">-</span></div>
  </div>

  <div id="datos">
    <table id="tabla">
      <thead>
        <tr>
          <th>#</th>
          <th>Tiempo (s)</th>
          <th>Ángulo (°)</th>
          <th>Impacto (g)</th>
          <th>Apoyo (ms)</th>
        </tr>
      </thead>
      <tbody id="cuerpoTabla"></tbody>
    </table>
  </div>

<script>
console.log("JS cargado OK");

window.addEventListener('load', () => {

  const btnConectar = document.getElementById('btnConectar');
  const estado = document.getElementById('estado');

  const UART_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
  const RX_CHAR_UUID      = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
  const TX_CHAR_UUID      = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

  let rxChar;

  function setEstado(msg) {
    estado.textContent = "Estado: " + msg;
  }

  btnConectar.addEventListener('click', async () => {
    try {
      setEstado("buscando...");

      const device = await navigator.bluetooth.requestDevice({
        filters: [{ services: [UART_SERVICE_UUID] }]
      });

      setEstado("conectando...");

      const server = await device.gatt.connect();
      const service = await server.getPrimaryService(UART_SERVICE_UUID);

      // 👇 ESTA ES LA CLAVE: TX = NOTIFICACIONES (lo que recibes)
      const txChar = await service.getCharacteristic(TX_CHAR_UUID);

      await txChar.startNotifications();

      txChar.addEventListener('characteristicvaluechanged', (event) => {
        const value = new TextDecoder().decode(event.target.value);
        console.log("RECIBIDO:", value);
        setEstado(value);
      });

      setEstado("conectado (esperando HELLO)");

    } catch (e) {
      console.error(e);
      setEstado("ERROR: " + e.message);
    }
  });

});
</script>
</body>
</html>
